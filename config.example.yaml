# PaperX Configuration Example
# Copy this file to config.yaml and fill in your paths and API keys:
#   cp config.example.yaml config.yaml

# Output index path (MinerU outputs root, containing one subfolder per paper)
path:
  root_folder: "PaperX/mineru_outputs"

# Generation model for PPT / poster / PR (DAG stage uses gemini-3-pro-preview)
# Options: "gemini-3-pro-preview" or "gpt-4o"
model_settings:
  generation_model: "gemini-3-pro-preview"

# API keys (recommend setting via environment variables in production)
api_keys:
  gemini_api_key: ""
  openai_api_key: ""

# Optional: In-Context Learning (ICL) / few-shot examples to improve output quality
# Leave disabled or omit section if not used.
# icl:
#   enabled: true
#   max_examples_per_prompt: 2
#   examples_file: "icl_examples.json"
